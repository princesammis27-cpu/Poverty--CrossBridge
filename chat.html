<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Community Chat | Poverty-CrossBridge </title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg0:#030810;--bg1:#060f1e;--bg2:#0a1828;--card:rgba(8,18,36,0.95);
      --border:rgba(0,230,118,0.16);--green:#00e676;--green2:#00c853;
      --gold:#ffd600;--blue:#00b0ff;--purple:#a78bfa;--red:#ff5252;
      --text1:#e8f4ff;--text2:#7a9bb5;--text3:#3a5a75;--r:12px;
      --shadow:0 8px 32px rgba(0,0,0,0.6);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Rajdhani',sans-serif;background:var(--bg0);color:var(--text1);
      height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    h1,h2,h3{font-family:'Orbitron',sans-serif;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg1);}
    ::-webkit-scrollbar-thumb{background:#1a3a55;border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--green2);}
    button{cursor:pointer;font-family:'Rajdhani',sans-serif;}

    /* ── TOP NAV ── */
    .topnav{
      height:60px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;
      background:rgba(4,12,24,0.98);
      border-bottom:1px solid var(--border);
      z-index:50;
    }
    .topnav-left{display:flex;align-items:center;gap:14px;}
    .back-btn{
      display:flex;align-items:center;gap:6px;
      padding:7px 14px;border-radius:8px;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      color:var(--text2);font-size:14px;font-weight:600;transition:all .2s;
    }
    .back-btn:hover{color:var(--text1);border-color:var(--border);}
    .topnav-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;
      background:linear-gradient(135deg,#fff,var(--green));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .topnav-right{display:flex;align-items:center;gap:10px;}
    .online-dot{width:9px;height:9px;border-radius:50%;background:var(--green);
      box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
    .online-count{font-size:13px;color:var(--text2);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ── LAYOUT ── */
    .chat-layout{flex:1;display:flex;overflow:hidden;}

    /* ── SIDEBAR (members) ── */
    .members-panel{
      width:220px;flex-shrink:0;
      background:rgba(4,10,22,0.95);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      overflow:hidden;
    }
    .members-header{
      padding:14px 16px;font-size:12px;letter-spacing:2px;
      text-transform:uppercase;color:var(--text3);font-weight:700;
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .members-list{flex:1;overflow-y:auto;padding:8px;}
    .member-item{
      display:flex;align-items:center;gap:10px;
      padding:8px 10px;border-radius:8px;cursor:default;
      transition:background .15s;
    }
    .member-item:hover{background:rgba(255,255,255,.04);}
    .member-av{
      width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;flex-shrink:0;position:relative;
    }
    .member-av img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
    .member-av-online::after{
      content:'';position:absolute;bottom:0;right:0;
      width:9px;height:9px;border-radius:50%;
      background:var(--green);border:2px solid var(--bg0);
    }
    .member-info{overflow:hidden;}
    .member-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .member-role{font-size:11px;color:var(--text3);}

    /* ── CHAT AREA ── */
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    /* ── MESSAGES ── */
    .messages-wrap{
      flex:1;overflow-y:auto;
      padding:20px 24px;
      display:flex;flex-direction:column;gap:4px;
    }

    /* Date separator */
    .date-sep{
      display:flex;align-items:center;gap:12px;
      padding:8px 0;font-size:11px;color:var(--text3);letter-spacing:1px;
    }
    .date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--text3);opacity:.25;}

    /* Message bubble */
    .msg{display:flex;gap:10px;padding:4px 0;align-items:flex-start;}
    .msg.mine{flex-direction:row-reverse;}
    .msg-av{
      width:36px;height:36px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;flex-shrink:0;
      margin-top:2px;
    }
    .msg-av img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
    .msg-body{max-width:70%;display:flex;flex-direction:column;gap:3px;}
    .msg.mine .msg-body{align-items:flex-end;}
    .msg-meta{display:flex;align-items:baseline;gap:8px;}
    .msg.mine .msg-meta{flex-direction:row-reverse;}
    .msg-author{font-size:13px;font-weight:700;}
    .msg-time{font-size:11px;color:var(--text3);}
    .msg-bubble{
      padding:10px 14px;border-radius:14px;
      font-size:15px;line-height:1.5;word-break:break-word;
      position:relative;
    }
    .msg-bubble.theirs{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-top-left-radius:4px;
    }
    .msg-bubble.mine{
      background:linear-gradient(135deg,rgba(0,180,60,0.22),rgba(0,230,118,0.15));
      border:1px solid rgba(0,230,118,0.25);
      border-top-right-radius:4px;
    }
    .msg-bubble.admin-bubble{
      background:linear-gradient(135deg,rgba(255,82,82,0.12),rgba(167,139,250,0.1));
      border:1px solid rgba(255,82,82,0.2);
    }

    /* Image in chat */
    .msg-image{
      max-width:280px;max-height:240px;border-radius:10px;
      cursor:pointer;object-fit:cover;display:block;
      border:1px solid rgba(255,255,255,.1);
      transition:filter .2s;margin-bottom:4px;
    }
    .msg-image:hover{filter:brightness(1.08);}

    /* Delete button */
    .msg-actions{
      display:none;position:absolute;top:-10px;right:8px;
      background:var(--bg2);border:1px solid var(--border);
      border-radius:6px;padding:3px;
    }
    .msg-bubble:hover .msg-actions{display:flex;}
    .msg-del{
      background:none;border:none;color:var(--red);
      padding:2px 6px;border-radius:4px;font-size:13px;
      transition:background .15s;
    }
    .msg-del:hover{background:rgba(255,82,82,.15);}

    /* Consecutive messages (same author within 2 min) */
    .msg.consecutive .msg-av{visibility:hidden;}
    .msg.consecutive .msg-meta{display:none;}
    .msg.consecutive .msg-bubble{border-radius:14px;}
    .msg.mine.consecutive .msg-bubble{border-top-right-radius:14px;}
    .msg:not(.consecutive):not(.mine) .msg-bubble{border-top-left-radius:4px;}

    /* Typing indicator */
    .typing-indicator{
      display:none;padding:6px 24px 0;
      font-size:12px;color:var(--text3);font-style:italic;
    }
    .typing-indicator.show{display:block;}

    /* Empty state */
    .chat-empty{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:var(--text3);text-align:center;gap:12px;padding:40px;
    }
    .chat-empty-icon{font-size:48px;opacity:.5;}
    .chat-empty-title{font-family:'Orbitron',sans-serif;font-size:16px;}
    .chat-empty-sub{font-size:14px;}

    /* ── INPUT BAR ── */
    .input-bar{
      flex-shrink:0;padding:16px 20px;
      background:rgba(4,10,22,0.98);
      border-top:1px solid var(--border);
    }

    /* Image preview */
    .img-preview-wrap{
      display:none;margin-bottom:10px;position:relative;width:fit-content;
    }
    .img-preview-wrap.show{display:flex;align-items:flex-start;gap:8px;}
    .img-preview{
      max-height:90px;border-radius:8px;border:1px solid var(--border);
    }
    .img-preview-remove{
      position:absolute;top:-6px;right:-6px;
      width:22px;height:22px;border-radius:50%;
      background:var(--red);border:none;color:#fff;
      font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;
      cursor:pointer;
    }

    .input-row{display:flex;align-items:flex-end;gap:10px;}
    .input-attach{
      width:42px;height:42px;border-radius:10px;flex-shrink:0;
      background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
      color:var(--text2);display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .2s;
    }
    .input-attach:hover{border-color:var(--green);color:var(--green);}
    .input-attach input{display:none;}
    .input-wrap{flex:1;position:relative;}
    .chat-input{
      width:100%;padding:11px 16px;resize:none;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:10px;color:var(--text1);font-size:15px;
      max-height:120px;line-height:1.4;outline:none;
      transition:border-color .2s,box-shadow .2s;
      font-family:'Rajdhani',sans-serif;
    }
    .chat-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.1);}
    .input-hint{font-size:11px;color:var(--text3);margin-top:5px;padding-left:2px;}
    .send-btn{
      width:42px;height:42px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,var(--green2),var(--green));
      border:none;color:#030810;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;
    }
    .send-btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* ── LIGHTBOX ── */
    .lightbox{
      display:none;position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,.9);
      align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .lightbox.open{display:flex;}
    .lightbox img{max-width:90vw;max-height:80vh;border-radius:12px;object-fit:contain;}
    .lightbox-close{
      position:fixed;top:20px;right:20px;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      color:#fff;width:40px;height:40px;border-radius:50%;
      font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    }

    /* ── TOAST ── */
    .pcb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;
      display:flex;align-items:center;gap:10px;padding:14px 20px;
      border-radius:10px;font-size:15px;font-weight:600;
      background:var(--bg2);border:1px solid var(--border);box-shadow:var(--shadow);
      transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:340px;}
    .pcb-toast--show{transform:translateX(0);}
    .pcb-toast--success{border-color:var(--green);}
    .pcb-toast--success .pcb-toast__icon{color:var(--green);}
    .pcb-toast--error{border-color:var(--red);}
    .pcb-toast--error .pcb-toast__icon{color:var(--red);}
    .pcb-toast--info{border-color:var(--blue);}
    .pcb-toast--info .pcb-toast__icon{color:var(--blue);}
    .pcb-toast__icon{font-size:18px;}

    /* ── LOADING OVERLAY ── */
    .loading-overlay{
      position:fixed;inset:0;z-index:200;
      background:var(--bg0);display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .loading-spinner{
      width:40px;height:40px;border:3px solid rgba(0,230,118,.2);
      border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--text2);}

    @media(max-width:640px){
      .members-panel{display:none;}
      .msg-image{max-width:220px;}
    }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading Chat…</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Full image"/>
</div>

<!-- ── TOP NAV ─────────────────────────────────────────── -->
<nav class="topnav">
  <div class="topnav-left">
    <a class="back-btn" href="dashboard.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
    <span class="topnav-title">Community Chat</span>
  </div>
  <div class="topnav-right">
    <span class="online-dot"></span>
    <span class="online-count" id="onlineCount">0 online</span>
  </div>
</nav>

<!-- ── MAIN LAYOUT ──────────────────────────────────────── -->
<div class="chat-layout">

  <!-- Members panel -->
  <aside class="members-panel">
    <div class="members-header">Members</div>
    <div class="members-list" id="membersList">
      <!-- populated by JS -->
    </div>
  </aside>

  <!-- Chat area -->
  <div class="chat-area">
    <div class="messages-wrap" id="messagesWrap">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-title">No messages yet</div>
        <div class="chat-empty-sub">Be the first to say hello to the community!</div>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator"></div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="img-preview-wrap" id="imgPreviewWrap">
        <img class="img-preview" id="imgPreview" src="" alt="preview"/>
        <button class="img-preview-remove" onclick="clearImage()" aria-label="Remove image">✕</button>
      </div>
      <div class="input-row">
        <label class="input-attach" title="Attach image">
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp"
                 onchange="handleFileSelect(event)"/>
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </label>

        <div class="input-wrap">
          <textarea class="chat-input" id="chatInput" rows="1"
            placeholder="Message the community…"
            maxlength="2000"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"></textarea>
          <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message" disabled>
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="supabase-config.js"></script>
<script>
/* ── STATE ─────────────────────────────────────────────── */
let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let isSending = false;          // duplicate-send guard
let pendingFile = null;
let renderedIds = new Set();    // duplicate-render guard
let members = {};               // uid → profile

/* ── INIT ──────────────────────────────────────────────── */
async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  const { data: p } = await DB.getProfile(currentUser.id);
  currentProfile = p || {};
  isAdmin = currentProfile.role === 'admin';

  await loadMembers();
  await loadMessages();
  subscribeRealtime();

  document.getElementById('loadingOverlay').style.display = 'none';

  const inp = document.getElementById('chatInput');
  inp.addEventListener('input', () => {
    document.getElementById('sendBtn').disabled =
      inp.value.trim() === '' && !pendingFile;
  });
  inp.focus();
}

/* ── MEMBERS ───────────────────────────────────────────── */
async function loadMembers() {
  const { data } = await DB.getAllProfiles();
  if (!data) return;
  data.forEach(p => { members[p.id] = p; });
  renderMembers(data);
  document.getElementById('onlineCount').textContent = `${data.length} member${data.length!==1?'s':''}`;
}

function renderMembers(profiles) {
  const list = document.getElementById('membersList');
  list.innerHTML = profiles.map(p => {
    const name = p.full_name || p.email || 'User';
    const ini  = initials(name);
    const col  = avatarColor(name);
    const role = p.role || 'user';
    return `
      <div class="member-item">
        <div class="member-av member-av-online" style="background:${col};color:#030810">
          ${p.avatar_url
            ? `<img src="${p.avatar_url}" alt="${esc(name)}" loading="lazy"/>`
            : ini}
        </div>
        <div class="member-info">
          <div class="member-name">${esc(name)}</div>
          <div class="member-role">${role}</div>
        </div>
      </div>`;
  }).join('');
}

/* ── LOAD MESSAGES ─────────────────────────────────────── */
async function loadMessages() {
  const { data, error } = await DB.getMessages(150);
  if (error) { toast('Could not load messages', 'error'); return; }
  if (!data || data.length === 0) return;
  document.getElementById('chatEmpty').style.display = 'none';
  data.forEach(m => appendMessage(m, false));
  scrollToBottom(true);
}

/* ── REALTIME ──────────────────────────────────────────── */
function subscribeRealtime() {
  Realtime.subscribeMessages(
    async (payload) => {
      const row = payload.new;
      if (renderedIds.has(row.id)) return;          // already shown (optimistic)
      // fetch full row with profile join
      const { data } = await DB.getMessages(1);     // tiny workaround
      // use a targeted select instead
      const { data: full } = await sb
        .from('messages')
        .select('*, profiles:user_id(full_name,avatar_url,email,role)')
        .eq('id', row.id)
        .single();
      if (full) {
        appendMessage(full, true);
        scrollToBottom();
      }
    },
    (payload) => {
      const el = document.getElementById(`msg-${payload.old.id}`);
      if (el) { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(()=>el.remove(), 300); }
    }
  );
}

// expose sb for inline realtime select above
const { createClient: _c } = window.supabase;
const sb = _c(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── APPEND MESSAGE ────────────────────────────────────── */
let lastAuthorId = null, lastMsgTime = null;

function appendMessage(msg, animate) {
  if (renderedIds.has(msg.id)) return;
  renderedIds.add(msg.id);
  document.getElementById('chatEmpty').style.display = 'none';

  const profile = msg.profiles || {};
  const name  = profile.full_name || profile.email || 'User';
  const role  = profile.role || 'user';
  const isMine = msg.user_id === currentUser.id;
  const canDel = isMine || isAdmin;
  const msgTime = new Date(msg.created_at);
  const sameAuthor = lastAuthorId === msg.user_id &&
    lastMsgTime && (msgTime - lastMsgTime) < 120000;

  const ini = initials(name);
  const col = avatarColor(name);

  const el = document.createElement('div');
  el.id = `msg-${msg.id}`;
  el.className = `msg${isMine?' mine':''}${sameAuthor?' consecutive':''}`;
  if (animate) el.style.cssText = 'opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s';

  const bubbleClass = `msg-bubble ${isMine ? 'mine' : (role==='admin' ? 'admin-bubble' : 'theirs')}`;

  const imageHtml = msg.image_url
    ? `<img class="msg-image" src="${esc(msg.image_url)}" alt="Image" loading="lazy"
           onclick="openLightbox('${esc(msg.image_url)}')" />`
    : '';
  const textHtml = msg.content
    ? `<span>${esc(msg.content).replace(/\n/g,'<br/>')}</span>`
    : '';

  el.innerHTML = `
    <div class="msg-av" style="background:${col};color:#030810">
      ${profile.avatar_url
        ? `<img src="${esc(profile.avatar_url)}" alt="${esc(name)}" loading="lazy"/>`
        : ini}
    </div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-author" style="color:${col}">${esc(name)}${role==='admin'?' 🛡️':''}</span>
        <span class="msg-time">${timeAgo(msg.created_at)}</span>
      </div>
      <div class="${bubbleClass}">
        ${imageHtml}${textHtml}
        ${canDel ? `<div class="msg-actions">
          <button class="msg-del" onclick="deleteMessage('${msg.id}','${msg.image_path||''}')"
            title="Delete message">🗑</button>
        </div>` : ''}
      </div>
    </div>`;

  document.getElementById('messagesWrap').appendChild(el);
  if (animate) requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform='translateY(0)';});

  lastAuthorId = msg.user_id;
  lastMsgTime  = msgTime;
}

/* ── SEND ──────────────────────────────────────────────── */
async function sendMessage() {
  if (isSending) return;                                    // anti-duplicate
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text && !pendingFile) return;

  isSending = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  let imageUrl = null, imagePath = null;

  try {
    // Upload image if present
    if (pendingFile) {
      toast('Uploading image…', 'info');
      const res = await Storage.uploadImage(pendingFile, currentUser.id);
      imageUrl  = res.url;
      imagePath = res.path;
      clearImage();
    }

    const { data: msg, error } = await DB.sendMessage({
      userId: currentUser.id,
      content: text || null,
      imageUrl, imagePath
    });

    if (error) throw error;

    // Optimistic render (realtime may re-fire, deduplicated via renderedIds)
    appendMessage(msg, true);
    scrollToBottom();

    inp.value = '';
    inp.style.height = '';
    inp.dispatchEvent(new Event('input'));

  } catch (err) {
    toast(err.message || 'Failed to send message', 'error');
  } finally {
    isSending = false;
    btn.disabled = inp.value.trim() === '' && !pendingFile;
  }
}

/* ── DELETE ────────────────────────────────────────────── */
async function deleteMessage(id, imgPath) {
  if (!confirm('Delete this message?')) return;
  if (imgPath) await Storage.deleteImage(imgPath);
  const { error } = await DB.deleteMessage(id);
  if (error) toast('Could not delete message', 'error');
  // Realtime DELETE event will remove the element
  else { const el = document.getElementById(`msg-${id}`); if(el) el.remove(); }
}

/* ── FILE SELECT ───────────────────────────────────────── */
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const MAX = 5 * 1024 * 1024;
  if (file.size > MAX) { toast('Image must be under 5 MB', 'error'); return; }
  const allowed = ['image/jpeg','image/png','image/gif','image/webp'];
  if (!allowed.includes(file.type)) { toast('Only JPG, PNG, GIF or WEBP allowed', 'error'); return; }
  pendingFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('imgPreview').src = url;
  document.getElementById('imgPreviewWrap').classList.add('show');
  document.getElementById('sendBtn').disabled = false;
  e.target.value = '';           // allow re-selecting same file
}

function clearImage() {
  pendingFile = null;
  document.getElementById('imgPreviewWrap').classList.remove('show');
  document.getElementById('imgPreview').src = '';
  const inp = document.getElementById('chatInput');
  document.getElementById('sendBtn').disabled = inp.value.trim() === '';
}

/* ── LIGHTBOX ──────────────────────────────────────────── */
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

/* ── HELPERS ───────────────────────────────────────────── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom(instant) {
  const wrap = document.getElementById('messagesWrap');
  wrap.scrollTo({ top: wrap.scrollHeight, behavior: instant ? 'auto' : 'smooth' });
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
}

const AV_COLORS = ['#00e676','#00b0ff','#7c3aed','#f59e0b','#ef4444','#06b6d4','#a78bfa'];
function avatarColor(name) { return AV_COLORS[(name||'?').charCodeAt(0) % AV_COLORS.length]; }

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60)   return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400)return `${Math.floor(s/3600)}h ago`;
  return new Date(d).toLocaleDateString();
}

function toast(msg, type='success') {
  const icons = {success:'✓',error:'✕',info:'ℹ'};
  const t = document.createElement('div');
  t.className = `pcb-toast pcb-toast--${type}`;
  t.innerHTML = `<span class="pcb-toast__icon">${icons[type]||icons.info}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('pcb-toast--show'));
  setTimeout(()=>{t.classList.remove('pcb-toast--show');setTimeout(()=>t.remove(),400);},3600);
}

/* ── BOOT ──────────────────────────────────────────────── */
init();
</script>
