    :root{

    /* ── SIDEBAR ── */
    .sidebar{

    }
    .sidebar-logo{

    .sidebar-logo-badge{
      font-size:10px;color:var(--green);letter-spacing:2px;

    }
    .sidebar-logo-title{
      font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:13px;font-weight:700;
      line-height:1.3;
      background:linear-gradient(135deg,#fff 30%,var(--green));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    .nav-section-label{
      padding:20px 20px 8px;font-size:10px;letter-spacing:2px;
      text-transform:uppercase;color:var(--text3);
    }
    .nav-item{
      display:flex;align-items:center;gap:12px;

    }
    .nav-item:hover{color:var(--text1);background:rgba(0,230,118,0.04);}
    .nav-item.active{color:var(--green);border-left-color:var(--green);background:rgba(0,230,118,0.07);}
    .nav-item svg{width:18px;height:18px;flex-shrink:0;}

      font-size:11px;background:rgba(0,230,118,0.15);color:var(--green);
    }

    .sidebar-user{
      margin-top:auto;padding:16px 20px;
      border-top:1px solid var(--border);
      display:flex;align-items:center;gap:12px;
    }
    .sidebar-avatar{
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;flex-shrink:0;

    .sidebar-user-info{flex:1;overflow:hidden;}
    .sidebar-user-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* ── HAMBURGER ── */
    .hamburger{

      border-radius:8px;padding:8px;cursor:pointer;
    }
    .sidebar-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
      z-index:99;backdrop-filter:blur(2px);
    }

    /* ── MAIN ── */
    .main{
      margin-left:var(--nav-w);flex:1;
      display:flex;flex-direction:column;min-height:100vh;
    }

    /* ── TOP BAR ── */
    .topbar{
      padding:20px 28px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);
      background:rgba(3,8,16,0.8);backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:50;
    }
    .topbar-title{font-size:20px;font-weight:700;}
    .topbar-actions{display:flex;align-items:center;gap:12px;}
    .topbar-date{font-size:13px;color:var(--text2);}

    /* ── PAGE CONTENT ── */
    .page{display:none;padding:28px;}
    .page.active{display:block;animation:fadeUp .35s ease;}

    /* ── WELCOME BANNER ── */
    .welcome-banner{
      background:linear-gradient(135deg,rgba(0,200,83,0.12) 0%,rgba(0,176,255,0.08) 100%);
      border:1px solid rgba(0,230,118,0.2);border-radius:var(--r);
      padding:28px 32px;margin-bottom:28px;position:relative;overflow:hidden;
    }
    .welcome-banner::before{
      content:&#x27;&#x27;;position:absolute;top:-40px;right:-40px;
      width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(0,230,118,0.15),transparent 70%);
    }
    .welcome-tag{font-size:12px;color:var(--green);letter-spacing:2px;
      text-transform:uppercase;margin-bottom:8px;}
    .welcome-name{font-size:clamp(20px,3vw,28px);font-weight:700;margin-bottom:6px;}
    .welcome-sub{font-size:15px;color:var(--text2);max-width:500px;}
    .welcome-actions{margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;}

    /* ── STAT CARDS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
    .stat-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:20px;display:flex;flex-direction:column;gap:10px;
      position:relative;overflow:hidden;transition:transform .2s,border-color .2s;
    }
    .stat-card:hover{transform:translateY(-2px);border-color:rgba(0,230,118,0.35);}
    .stat-card::before{
      content:&#x27;&#x27;;position:absolute;top:0;left:0;right:0;height:2px;
    }
    .stat-card.c-green::before{background:linear-gradient(90deg,var(--green2),var(--green));}
    .stat-card.c-blue::before{background:linear-gradient(90deg,#0070aa,var(--blue));}
    .stat-card.c-gold::before{background:linear-gradient(90deg,#aa8000,var(--gold));}
    .stat-card.c-purple::before{background:linear-gradient(90deg,#5520b0,var(--purple));}
    .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .stat-icon.green{background:rgba(0,230,118,.12);color:var(--green);}
    .stat-icon.blue{background:rgba(0,176,255,.12);color:var(--blue);}
    .stat-icon.gold{background:rgba(255,214,0,.12);color:var(--gold);}
    .stat-icon.purple{background:rgba(167,139,250,.12);color:var(--purple);}
    .stat-value{font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:28px;font-weight:700;}
    .stat-label{font-size:13px;color:var(--text2);}

    /* ── SECTION HEADER ── */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}

    .section-link{font-size:13px;color:var(--green);cursor:pointer;}

    /* ── FEATURE CARDS ── */
    .features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px;}
    .feature-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:22px;cursor:pointer;transition:all .25s;
    }
    .feature-card:hover{border-color:rgba(0,230,118,0.35);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.5);}

      display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px;}
    .feature-card-title{font-size:16px;font-weight:700;margin-bottom:6px;}
    .feature-card-desc{font-size:13px;color:var(--text2);line-height:1.5;}
    .feature-card-arrow{margin-top:14px;font-size:18px;color:var(--green);}

    /* ── ROADMAP ── */

    .roadmap-item{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:16px 20px;display:flex;align-items:center;gap:16px;
    }
    .roadmap-step{
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:13px;font-weight:700;
    }
    .roadmap-step.done{background:rgba(0,230,118,.15);color:var(--green);border:2px solid var(--green);}
    .roadmap-step.current{background:rgba(255,214,0,.12);color:var(--gold);border:2px solid var(--gold);}
    .roadmap-step.todo{background:rgba(255,255,255,.05);color:var(--text3);border:2px solid var(--text3);}
    .roadmap-info{flex:1;}
    .roadmap-name{font-size:15px;font-weight:600;}
    .roadmap-sub{font-size:12px;color:var(--text2);margin-top:2px;}
    .roadmap-status{font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;}
    .status-done   {background:rgba(0,230,118,.12);color:var(--green);}
    .status-current{background:rgba(255,214,0,.12);color:var(--gold);}
    .status-todo   {background:rgba(255,255,255,.05);color:var(--text3);}

    /* ── OPPORTUNITIES ── */
    .opps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .opp-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);

    .opp-card:hover{border-color:rgba(0,230,118,.3);transform:translateY(-2px);}

    .opp-tag.scholarship{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.3);}
    .opp-tag.internship{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
    .opp-tag.new{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3);}
    .opp-title{font-size:16px;font-weight:700;margin-bottom:6px;}
    .opp-org{font-size:13px;color:var(--text2);margin-bottom:12px;}
    .opp-footer{display:flex;align-items:center;justify-content:space-between;}
    .opp-location{font-size:12px;color:var(--text3);}
    .opp-btn{
      padding:6px 14px;font-size:12px;font-weight:700;
      background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);
      color:var(--green);border-radius:6px;cursor:pointer;transition:all .2s;
    }
    .opp-btn:hover{background:var(--green);color:#010a06;}

    /* ── SKILL ASSESSMENT ── */
    .quiz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;}
    .quiz-progress-bar{height:6px;background:rgba(255,255,255,.08);border-radius:99px;margin-bottom:20px;overflow:hidden;}
    .quiz-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .4s;}
    .quiz-question{font-size:17px;font-weight:700;margin-bottom:18px;}
    .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .quiz-option{
      padding:12px 16px;background:rgba(255,255,255,.04);
      border:1.5px solid rgba(255,255,255,.1);border-radius:10px;
      font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;color:var(--text1);
    }
    .quiz-option:hover{border-color:var(--green);background:rgba(0,230,118,.07);}
    .quiz-option.selected{border-color:var(--green);background:rgba(0,230,118,.12);color:var(--green);}
    .quiz-result{text-align:center;padding:20px 0;display:none;}
    .quiz-result-score{font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:48px;font-weight:900;color:var(--green);}
    .quiz-result-label{font-size:16px;color:var(--text2);margin-top:8px;}
    .quiz-result-careers{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
    .career-chip{padding:6px 16px;border-radius:99px;font-size:13px;font-weight:600;
      background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green);}

    /* ── BTNS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:700;border:none;
      cursor:pointer;transition:all .2s;letter-spacing:.5px;}
    .btn-primary{background:linear-gradient(135deg,var(--green2),var(--green));color:#010a06;}
    .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text1);}
    .btn-outline:hover{border-color:var(--green);color:var(--green);}
    .btn-sm{padding:8px 16px;font-size:13px;}

    /* ── TOAST ── */
    .pcb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;
      display:flex;align-items:center;gap:10px;padding:14px 20px;
      border-radius:10px;font-size:15px;font-weight:600;
      background:var(--bg2);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.6);
      transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:340px;}
    .pcb-toast--show{transform:translateX(0);}
    .pcb-toast--success{border-color:var(--green);}
    .pcb-toast--success .pcb-toast__icon{color:var(--green);}
    .pcb-toast--error{border-color:var(--red);}
    .pcb-toast--error .pcb-toast__icon{color:var(--red);}
    .pcb-toast__icon{font-size:18px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .sidebar-overlay.show{display:block;}
      .hamburger{display:flex;}
      .main{margin-left:0;}
      .page{padding:16px;}
      .stats-grid{grid-template-columns:1fr 1fr;}
      .quiz-options{grid-template-columns:1fr;}
    }
  &lt;/style&gt;
&lt;/head&gt;

&lt;script&gt;
/* ── QUIZ DATA ───────────────────────────────────────────── */
const QUIZ = [
  { q:&#x27;What activity do you enjoy most?&#x27;, opts:[&#x27;Building/creating things&#x27;,&#x27;Solving complex problems&#x27;,&#x27;Helping and teaching others&#x27;,&#x27;Designing visual content&#x27;] },
  { q:&#x27;Which subject do you find most interesting?&#x27;, opts:[&#x27;Mathematics &amp; Logic&#x27;,&#x27;Science &amp; Technology&#x27;,&#x27;Social Studies &amp; Communication&#x27;,&#x27;Arts &amp; Creativity&#x27;] },
  { q:&#x27;How do you prefer to work?&#x27;, opts:[&#x27;Independently with deep focus&#x27;,&#x27;In a team brainstorming&#x27;,&#x27;One-on-one with people&#x27;,&#x27;Freely experimenting&#x27;] },
  { q:&#x27;Which skill comes most naturally to you?&#x27;, opts:[&#x27;Analytical thinking&#x27;,&#x27;Technical problem-solving&#x27;,&#x27;Communication &amp; empathy&#x27;,&#x27;Aesthetic sense &amp; design&#x27;] },
  { q:&#x27;What kind of impact do you want to make?&#x27;, opts:[&#x27;Build technology products&#x27;,&#x27;Advance science &amp; research&#x27;,&#x27;Educate and uplift communities&#x27;,&#x27;Create inspiring experiences&#x27;] },
];
const CAREERS = {
  0: [&#x27;Software Developer&#x27;,&#x27;Data Engineer&#x27;,&#x27;Systems Architect&#x27;],
  1: [&#x27;Data Analyst&#x27;,&#x27;Cybersecurity Expert&#x27;,&#x27;AI/ML Engineer&#x27;],
  2: [&#x27;UX/UI Designer&#x27;,&#x27;Digital Marketer&#x27;,&#x27;Product Manager&#x27;],
  3: [&#x27;Graphic Designer&#x27;,&#x27;Content Creator&#x27;,&#x27;Brand Strategist&#x27;],
};
let qIdx = 0, answers = [];

function renderQuestion() {
  const data = QUIZ[qIdx];
  document.getElementById(&#x27;quizQuestion&#x27;).textContent = `Q${qIdx+1}. ${data.q}`;
  document.getElementById(&#x27;quizBar&#x27;).style.width = `${(qIdx/QUIZ.length)*100}%`;
  document.getElementById(&#x27;quizNext&#x27;).disabled = true;
  const opts = document.getElementById(&#x27;quizOptions&#x27;);
  opts.innerHTML = data.opts.map((o,i)=&gt;
    `&lt;button class=&quot;quiz-option&quot; onclick=&quot;selectOpt(this,${i})&quot;&gt;${o}&lt;/button&gt;`
  ).join(&#x27;&#x27;);
}

function selectOpt(btn, idx) {
  document.querySelectorAll(&#x27;.quiz-option&#x27;).forEach(b=&gt;b.classList.remove(&#x27;selected&#x27;));
  btn.classList.add(&#x27;selected&#x27;);
  answers[qIdx] = idx;
  document.getElementById(&#x27;quizNext&#x27;).disabled = false;
}

function nextQuestion() {
  if (answers[qIdx] === undefined) return;
  qIdx++;
  if (qIdx &gt;= QUIZ.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById(&#x27;quizContent&#x27;).style.display = &#x27;none&#x27;;
  document.getElementById(&#x27;quizResult&#x27;).style.display = &#x27;block&#x27;;
  document.getElementById(&#x27;quizBar&#x27;).style.width = &#x27;100%&#x27;;
  const score = Math.floor(75 + Math.random() * 20);
  document.getElementById(&#x27;quizScore&#x27;).textContent = score + &#x27;%&#x27;;
  const topAns = answers.reduce((a,v,_,arr)=&gt;(arr.filter(x=&gt;x===v).length&gt;arr.filter(x=&gt;x===a).length?v:a),answers[0]);
  const careers = CAREERS[topAns] || CAREERS[0];
  document.getElementById(&#x27;quizCareers&#x27;).innerHTML = careers.map(c=&gt;`&lt;span class=&quot;career-chip&quot;&gt;${c}&lt;/span&gt;`).join(&#x27;&#x27;);
  if(currentUser) {
    document.getElementById(&#x27;stat-skills&#x27;).textContent = QUIZ.length;
    document.getElementById(&#x27;stat-progress&#x27;).textContent = score + &#x27;%&#x27;;
  }
}

/* ── NAV ─────────────────────────────────────────────────── */
const TITLES = { dashboard:&#x27;Dashboard&#x27;, skills:&#x27;Skill Assessment&#x27;, roadmap:&#x27;Career Roadmap&#x27;, opportunities:&#x27;Opportunities Hub&#x27;, profile:&#x27;My Profile&#x27; };
function showPage(id) {
  document.querySelectorAll(&#x27;.page&#x27;).forEach(p=&gt;p.classList.remove(&#x27;active&#x27;));
  document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n=&gt;n.classList.remove(&#x27;active&#x27;));
  document.getElementById(`page-${id}`).classList.add(&#x27;active&#x27;);
  document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n=&gt;{
    if(n.getAttribute(&#x27;onclick&#x27;)===`showPage(&#x27;${id}&#x27;)`) n.classList.add(&#x27;active&#x27;);
  });
  document.getElementById(&#x27;topbarTitle&#x27;).textContent = TITLES[id] || id;
  if(window.innerWidth &lt; 769) toggleSidebar();
}

function toggleSidebar() {
  document.getElementById(&#x27;sidebar&#x27;).classList.toggle(&#x27;open&#x27;);
  document.getElementById(&#x27;overlay&#x27;).classList.toggle(&#x27;show&#x27;);
}

/* ── DATE ─────────────────────────────────────────────────── */
document.getElementById(&#x27;topbarDate&#x27;).textContent = new Date().toLocaleDateString(&#x27;en-KE&#x27;,{weekday:&#x27;short&#x27;,day:&#x27;numeric&#x27;,month:&#x27;long&#x27;,year:&#x27;numeric&#x27;});

/* ── AUTH ─────────────────────────────────────────────────── */
let currentUser = null, currentProfile = null;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  const { data: p } = await DB.getProfile(currentUser.id);
  currentProfile = p;
  const name = p?.full_name || currentUser.user_metadata?.full_name || currentUser.email;
  const role = p?.role || &#x27;user&#x27;;

  document.getElementById(&#x27;welcomeName&#x27;).textContent = name.split(&#x27; &#x27;)[0] + &#x27;!&#x27;;
  document.getElementById(&#x27;sidebarName&#x27;).textContent = name;
  document.getElementById(&#x27;sidebarRole&#x27;).textContent = role.charAt(0).toUpperCase()+role.slice(1);
  document.getElementById(&#x27;profileName&#x27;).textContent = name;
  document.getElementById(&#x27;profileEmail&#x27;).textContent = currentUser.email;
  document.getElementById(&#x27;profileInfoName&#x27;).textContent = name;
  document.getElementById(&#x27;profileInfoEmail&#x27;).textContent = currentUser.email;
  document.getElementById(&#x27;profileInfoDate&#x27;).textContent = new Date(currentUser.created_at).toLocaleDateString();
  document.getElementById(&#x27;profileInfoRole&#x27;).innerHTML = `&lt;span class=&quot;badge badge-${role===&#x27;admin&#x27;?&#x27;red&#x27;:&#x27;green&#x27;}&quot;&gt;${role}&lt;/span&gt;`;

  const av = document.getElementById(&#x27;sidebarAvatar&#x27;);
  const ini = (name||&#x27;?&#x27;).split(&#x27; &#x27;).map(n=&gt;n[0]).slice(0,2).join(&#x27;&#x27;).toUpperCase();
  av.textContent = ini;
  av.style.background = AV_COLORS[(name||&#x27;?&#x27;).charCodeAt(0) % AV_COLORS.length];
  av.style.color = &#x27;#030810&#x27;;

  if (role === &#x27;admin&#x27;) {
    document.getElementById(&#x27;adminNavSection&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;adminNavLink&#x27;).style.display = &#x27;flex&#x27;;
  }
  renderQuestion();
}

async function handleSignOut() {
  await Auth.signOut();
  window.location.href = &#x27;index.html&#x27;;
}

const AV_COLORS = [&#x27;#00e676&#x27;,&#x27;#00b0ff&#x27;,&#x27;#7c3aed&#x27;,&#x27;#f59e0b&#x27;,&#x27;#ef4444&#x27;,&#x27;#06b6d4&#x27;,&#x27;#a78bfa&#x27;];

function toast(msg, type=&#x27;success&#x27;) {
  const t = document.createElement(&#x27;div&#x27;);
  t.className = `pcb-toast pcb-toast--${type}`;
  t.innerHTML = `&lt;span class=&quot;pcb-toast__icon&quot;&gt;${type===&#x27;success&#x27;?&#x27;✓&#x27;:&#x27;✕&#x27;}&lt;/span&gt;&lt;span&gt;${msg}&lt;/span&gt;`;
  document.body.appendChild(t);
  requestAnimationFrame(()=&gt;t.classList.add(&#x27;pcb-toast--show&#x27;));
  setTimeout(()=&gt;{t.classList.remove(&#x27;pcb-toast--show&#x27;);setTimeout(()=&gt;t.remove(),400);},3500);
}

// Embed shared badge CSS
const style = document.createElement(&#x27;style&#x27;);
style.textContent = `.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.5px}.badge-green{background:rgba(0,230,118,.15);color:#00e676;border:1px solid rgba(0,230,118,.3)}.badge-red{background:rgba(255,82,82,.12);color:#ff5252;border:1px solid rgba(255,82,82,.3)}.btn-danger{background:rgba(255,82,82,.15);border:1.5px solid #ff5252;color:#ff5252}.btn-danger:hover{background:#ff5252;color:#fff}`;
document.head.appendChild(style);

init();
&lt;/script&gt;

      border:1.5px solid rgba(255,255,255,.1);

      max-height:120px;line-height:1.4;outline:none;
      transition:border-color .2s,box-shadow .2s;
      font-family:&#x27;Rajdhani&#x27;,sans-serif;
    }
    .chat-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,230,118,.1);}
    .input-hint{font-size:11px;color:var(--text3);margin-top:5px;padding-left:2px;}
    .send-btn{
      width:42px;height:42px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(135deg,var(--green2),var(--green));
      border:none;color:#030810;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;
    }
    .send-btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    /* ── LIGHTBOX ── */
    .lightbox{
      display:none;position:fixed;inset:0;z-index:999;
      background:rgba(0,0,0,.9);
      align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .lightbox.open{display:flex;}
    .lightbox img{max-width:90vw;max-height:80vh;border-radius:12px;object-fit:contain;}
    .lightbox-close{
      position:fixed;top:20px;right:20px;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      color:#fff;width:40px;height:40px;border-radius:50%;
      font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    }

    /* ── TOAST ── */
    .pcb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;
      display:flex;align-items:center;gap:10px;padding:14px 20px;
      border-radius:10px;font-size:15px;font-weight:600;
      background:var(--bg2);border:1px solid var(--border);box-shadow:var(--shadow);
      transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:340px;}
    .pcb-toast--show{transform:translateX(0);}
    .pcb-toast--success{border-color:var(--green);}
    .pcb-toast--success .pcb-toast__icon{color:var(--green);}
    .pcb-toast--error{border-color:var(--red);}
    .pcb-toast--error .pcb-toast__icon{color:var(--red);}
    .pcb-toast--info{border-color:var(--blue);}
    .pcb-toast--info .pcb-toast__icon{color:var(--blue);}
    .pcb-toast__icon{font-size:18px;}

    /* ── LOADING OVERLAY ── */
    .loading-overlay{
      position:fixed;inset:0;z-index:200;
      background:var(--bg0);display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .loading-spinner{
      width:40px;height:40px;border:3px solid rgba(0,230,118,.2);
      border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:14px;color:var(--text2);}

    @media(max-width:640px){
      .members-panel{display:none;}
      .msg-image{max-width:220px;}
    }
  &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

&lt;!-- Loading --&gt;
&lt;div class=&quot;loading-overlay&quot; id=&quot;loadingOverlay&quot;&gt;
  &lt;div class=&quot;loading-spinner&quot;&gt;&lt;/div&gt;
  &lt;div class=&quot;loading-text&quot;&gt;Loading Chat…&lt;/div&gt;
&lt;/div&gt;

&lt;!-- Lightbox --&gt;
&lt;div class=&quot;lightbox&quot; id=&quot;lightbox&quot; onclick=&quot;closeLightbox()&quot;&gt;
  &lt;button class=&quot;lightbox-close&quot; onclick=&quot;closeLightbox()&quot;&gt;✕&lt;/button&gt;
  &lt;img id=&quot;lightboxImg&quot; src=&quot;&quot; alt=&quot;Full image&quot;/&gt;
&lt;/div&gt;

&lt;!-- ── TOP NAV ─────────────────────────────────────────── --&gt;
&lt;nav class=&quot;topnav&quot;&gt;
  &lt;div class=&quot;topnav-left&quot;&gt;
    &lt;a class=&quot;back-btn&quot; href=&quot;dashboard.html&quot;&gt;
      &lt;svg width=&quot;16&quot; height=&quot;16&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; viewBox=&quot;0 0 24 24&quot;&gt;
        &lt;polyline points=&quot;15 18 9 12 15 6&quot;/&gt;
      &lt;/svg&gt;
      Back
    &lt;/a&gt;
    &lt;span class=&quot;topnav-title&quot;&gt;Community Chat&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;topnav-right&quot;&gt;
    &lt;span class=&quot;online-dot&quot;&gt;&lt;/span&gt;
    &lt;span class=&quot;online-count&quot; id=&quot;onlineCount&quot;&gt;0 online&lt;/span&gt;
  &lt;/div&gt;
&lt;/nav&gt;

&lt;!-- ── MAIN LAYOUT ──────────────────────────────────────── --&gt;
&lt;div class=&quot;chat-layout&quot;&gt;

  &lt;!-- Members panel --&gt;
  &lt;aside class=&quot;members-panel&quot;&gt;
    &lt;div class=&quot;members-header&quot;&gt;Members&lt;/div&gt;
    &lt;div class=&quot;members-list&quot; id=&quot;membersList&quot;&gt;
      &lt;!-- populated by JS --&gt;
    &lt;/div&gt;
  &lt;/aside&gt;

  &lt;!-- Chat area --&gt;
  &lt;div class=&quot;chat-area&quot;&gt;
    &lt;div class=&quot;messages-wrap&quot; id=&quot;messagesWrap&quot;&gt;
      &lt;div class=&quot;chat-empty&quot; id=&quot;chatEmpty&quot;&gt;
        &lt;div class=&quot;chat-empty-icon&quot;&gt;💬&lt;/div&gt;
        &lt;div class=&quot;chat-empty-title&quot;&gt;No messages yet&lt;/div&gt;
        &lt;div class=&quot;chat-empty-sub&quot;&gt;Be the first to say hello to the community!&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;typing-indicator&quot; id=&quot;typingIndicator&quot;&gt;&lt;/div&gt;

    &lt;!-- Input bar --&gt;
    &lt;div class=&quot;input-bar&quot;&gt;
      &lt;div class=&quot;img-preview-wrap&quot; id=&quot;imgPreviewWrap&quot;&gt;
        &lt;img class=&quot;img-preview&quot; id=&quot;imgPreview&quot; src=&quot;&quot; alt=&quot;preview&quot;/&gt;
        &lt;button class=&quot;img-preview-remove&quot; onclick=&quot;clearImage()&quot; aria-label=&quot;Remove image&quot;&gt;✕&lt;/button&gt;
      &lt;/div&gt;
      &lt;div class=&quot;input-row&quot;&gt;
        &lt;label class=&quot;input-attach&quot; title=&quot;Attach image&quot;&gt;
          &lt;input type=&quot;file&quot; id=&quot;fileInput&quot; accept=&quot;image/jpeg,image/png,image/gif,image/webp&quot;
                 onchange=&quot;handleFileSelect(event)&quot;/&gt;
          &lt;svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; viewBox=&quot;0 0 24 24&quot;&gt;
            &lt;rect x=&quot;3&quot; y=&quot;3&quot; width=&quot;18&quot; height=&quot;18&quot; rx=&quot;2&quot;/&gt;
            &lt;circle cx=&quot;8.5&quot; cy=&quot;8.5&quot; r=&quot;1.5&quot;/&gt;
            &lt;polyline points=&quot;21 15 16 10 5 21&quot;/&gt;
          &lt;/svg&gt;
        &lt;/label&gt;

        &lt;div class=&quot;input-wrap&quot;&gt;
          &lt;textarea class=&quot;chat-input&quot; id=&quot;chatInput&quot; rows=&quot;1&quot;
            placeholder=&quot;Message the community…&quot;
            maxlength=&quot;2000&quot;
            onkeydown=&quot;handleKey(event)&quot;
            oninput=&quot;autoResize(this)&quot;&gt;&lt;/textarea&gt;
          &lt;div class=&quot;input-hint&quot;&gt;Press Enter to send &amp;nbsp;·&amp;nbsp; Shift+Enter for new line&lt;/div&gt;
        &lt;/div&gt;

        &lt;button class=&quot;send-btn&quot; id=&quot;sendBtn&quot; onclick=&quot;sendMessage()&quot; aria-label=&quot;Send message&quot; disabled&gt;
          &lt;svg width=&quot;20&quot; height=&quot;20&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2.5&quot; viewBox=&quot;0 0 24 24&quot;&gt;
            &lt;line x1=&quot;22&quot; y1=&quot;2&quot; x2=&quot;11&quot; y2=&quot;13&quot;/&gt;
            &lt;polygon points=&quot;22 2 15 22 11 13 2 9 22 2&quot;/&gt;
          &lt;/svg&gt;
        &lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;script src=&quot;supabase-config.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
/* ── STATE ─────────────────────────────────────────────── */
let currentUser = null;
let currentProfile = null;
let isAdmin = false;
let isSending = false;          // duplicate-send guard
let pendingFile = null;
let renderedIds = new Set();    // duplicate-render guard
let members = {};               // uid → profile

/* ── INIT ──────────────────────────────────────────────── */
async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  const { data: p } = await DB.getProfile(currentUser.id);
  currentProfile = p || {};
  isAdmin = currentProfile.role === &#x27;admin&#x27;;

  await loadMembers();
  await loadMessages();
  subscribeRealtime();

  document.getElementById(&#x27;loadingOverlay&#x27;).style.display = &#x27;none&#x27;;

  const inp = document.getElementById(&#x27;chatInput&#x27;);
  inp.addEventListener(&#x27;input&#x27;, () =&gt; {
    document.getElementById(&#x27;sendBtn&#x27;).disabled =
      inp.value.trim() === &#x27;&#x27; &amp;&amp; !pendingFile;
  });
  inp.focus();
}

/* ── MEMBERS ───────────────────────────────────────────── */
async function loadMembers() {
  const { data } = await DB.getAllProfiles();
  if (!data) return;
  data.forEach(p =&gt; { members[p.id] = p; });
  renderMembers(data);
  document.getElementById(&#x27;onlineCount&#x27;).textContent = `${data.length} member${data.length!==1?&#x27;s&#x27;:&#x27;&#x27;}`;
}

function renderMembers(profiles) {
  const list = document.getElementById(&#x27;membersList&#x27;);
  list.innerHTML = profiles.map(p =&gt; {
    const name = p.full_name || p.email || &#x27;User&#x27;;
    const ini  = initials(name);
    const col  = avatarColor(name);
    const role = p.role || &#x27;user&#x27;;
    return `
      &lt;div class=&quot;member-item&quot;&gt;
        &lt;div class=&quot;member-av member-av-online&quot; style=&quot;background:${col};color:#030810&quot;&gt;
          ${p.avatar_url
            ? `&lt;img src=&quot;${p.avatar_url}&quot; alt=&quot;${esc(name)}&quot; loading=&quot;lazy&quot;/&gt;`
            : ini}
        &lt;/div&gt;
        &lt;div class=&quot;member-info&quot;&gt;
          &lt;div class=&quot;member-name&quot;&gt;${esc(name)}&lt;/div&gt;
          &lt;div class=&quot;member-role&quot;&gt;${role}&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
}

/* ── LOAD MESSAGES ─────────────────────────────────────── */
async function loadMessages() {
  const { data, error } = await DB.getMessages(150);
  if (error) { toast(&#x27;Could not load messages&#x27;, &#x27;error&#x27;); return; }
  if (!data || data.length === 0) return;
  document.getElementById(&#x27;chatEmpty&#x27;).style.display = &#x27;none&#x27;;
  data.forEach(m =&gt; appendMessage(m, false));
  scrollToBottom(true);
}

/* ── REALTIME ──────────────────────────────────────────── */
function subscribeRealtime() {
  Realtime.subscribeMessages(
    async (payload) =&gt; {
      const row = payload.new;
      if (renderedIds.has(row.id)) return;          // already shown (optimistic)
      // fetch full row with profile join
      const { data } = await DB.getMessages(1);     // tiny workaround
      // use a targeted select instead
      const { data: full } = await sb
        .from(&#x27;messages&#x27;)
        .select(&#x27;*, profiles:user_id(full_name,avatar_url,email,role)&#x27;)
        .eq(&#x27;id&#x27;, row.id)
        .single();
      if (full) {
        appendMessage(full, true);
        scrollToBottom();
      }
    },
    (payload) =&gt; {
      const el = document.getElementById(`msg-${payload.old.id}`);
      if (el) { el.style.opacity = &#x27;0&#x27;; el.style.transition = &#x27;opacity .3s&#x27;; setTimeout(()=&gt;el.remove(), 300); }
    }
  );
}

// expose sb for inline realtime select above
const { createClient: _c } = window.supabase;
const sb = _c(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── APPEND MESSAGE ────────────────────────────────────── */
let lastAuthorId = null, lastMsgTime = null;

function appendMessage(msg, animate) {
  if (renderedIds.has(msg.id)) return;
  renderedIds.add(msg.id);
  document.getElementById(&#x27;chatEmpty&#x27;).style.display = &#x27;none&#x27;;

  const profile = msg.profiles || {};
  const name  = profile.full_name || profile.email || &#x27;User&#x27;;
  const role  = profile.role || &#x27;user&#x27;;
  const isMine = msg.user_id === currentUser.id;
  const canDel = isMine || isAdmin;
  const msgTime = new Date(msg.created_at);
  const sameAuthor = lastAuthorId === msg.user_id &amp;&amp;
    lastMsgTime &amp;&amp; (msgTime - lastMsgTime) &lt; 120000;

  const ini = initials(name);
  const col = avatarColor(name);

  const el = document.createElement(&#x27;div&#x27;);
  el.id = `msg-${msg.id}`;
  el.className = `msg${isMine?&#x27; mine&#x27;:&#x27;&#x27;}${sameAuthor?&#x27; consecutive&#x27;:&#x27;&#x27;}`;
  if (animate) el.style.cssText = &#x27;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s&#x27;;

  const bubbleClass = `msg-bubble ${isMine ? &#x27;mine&#x27; : (role===&#x27;admin&#x27; ? &#x27;admin-bubble&#x27; : &#x27;theirs&#x27;)}`;

  const imageHtml = msg.image_url
    ? `&lt;img class=&quot;msg-image&quot; src=&quot;${esc(msg.image_url)}&quot; alt=&quot;Image&quot; loading=&quot;lazy&quot;
           onclick=&quot;openLightbox(&#x27;${esc(msg.image_url)}&#x27;)&quot; /&gt;`
    : &#x27;&#x27;;
  const textHtml = msg.content
    ? `&lt;span&gt;${esc(msg.content).replace(/\n/g,&#x27;&lt;br/&gt;&#x27;)}&lt;/span&gt;`
    : &#x27;&#x27;;

  el.innerHTML = `
    &lt;div class=&quot;msg-av&quot; style=&quot;background:${col};color:#030810&quot;&gt;
      ${profile.avatar_url
        ? `&lt;img src=&quot;${esc(profile.avatar_url)}&quot; alt=&quot;${esc(name)}&quot; loading=&quot;lazy&quot;/&gt;`
        : ini}
    &lt;/div&gt;
    &lt;div class=&quot;msg-body&quot;&gt;
      &lt;div class=&quot;msg-meta&quot;&gt;
        &lt;span class=&quot;msg-author&quot; style=&quot;color:${col}&quot;&gt;${esc(name)}${role===&#x27;admin&#x27;?&#x27; 🛡️&#x27;:&#x27;&#x27;}&lt;/span&gt;
        &lt;span class=&quot;msg-time&quot;&gt;${timeAgo(msg.created_at)}&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;${bubbleClass}&quot;&gt;
        ${imageHtml}${textHtml}
        ${canDel ? `&lt;div class=&quot;msg-actions&quot;&gt;
          &lt;button class=&quot;msg-del&quot; onclick=&quot;deleteMessage(&#x27;${msg.id}&#x27;,&#x27;${msg.image_path||&#x27;&#x27;}&#x27;)&quot;
            title=&quot;Delete message&quot;&gt;🗑&lt;/button&gt;
        &lt;/div&gt;` : &#x27;&#x27;}
      &lt;/div&gt;
    &lt;/div&gt;`;

  document.getElementById(&#x27;messagesWrap&#x27;).appendChild(el);
  if (animate) requestAnimationFrame(()=&gt;{el.style.opacity=&#x27;1&#x27;;el.style.transform=&#x27;translateY(0)&#x27;;});

  lastAuthorId = msg.user_id;
  lastMsgTime  = msgTime;
}

/* ── SEND ──────────────────────────────────────────────── */
async function sendMessage() {
  if (isSending) return;                                    // anti-duplicate
  const inp = document.getElementById(&#x27;chatInput&#x27;);
  const text = inp.value.trim();
  if (!text &amp;&amp; !pendingFile) return;

  isSending = true;
  const btn = document.getElementById(&#x27;sendBtn&#x27;);
  btn.disabled = true;

  let imageUrl = null, imagePath = null;

  try {
    // Upload image if present
    if (pendingFile) {
      toast(&#x27;Uploading image…&#x27;, &#x27;info&#x27;);
      const res = await Storage.uploadImage(pendingFile, currentUser.id);
      imageUrl  = res.url;
      imagePath = res.path;
      clearImage();
    }

    const { data: msg, error } = await DB.sendMessage({
      userId: currentUser.id,
      content: text || null,
      imageUrl, imagePath
    });

    if (error) throw error;

    // Optimistic render (realtime may re-fire, deduplicated via renderedIds)
    appendMessage(msg, true);
    scrollToBottom();

    inp.value = &#x27;&#x27;;
    inp.style.height = &#x27;&#x27;;
    inp.dispatchEvent(new Event(&#x27;input&#x27;));

  } catch (err) {
    toast(err.message || &#x27;Failed to send message&#x27;, &#x27;error&#x27;);
  } finally {
    isSending = false;
    btn.disabled = inp.value.trim() === &#x27;&#x27; &amp;&amp; !pendingFile;
  }
}

/* ── DELETE ────────────────────────────────────────────── */
async function deleteMessage(id, imgPath) {
  if (!confirm(&#x27;Delete this message?&#x27;)) return;
  if (imgPath) await Storage.deleteImage(imgPath);
  const { error } = await DB.deleteMessage(id);
  if (error) toast(&#x27;Could not delete message&#x27;, &#x27;error&#x27;);
  // Realtime DELETE event will remove the element
  else { const el = document.getElementById(`msg-${id}`); if(el) el.remove(); }
}

/* ── FILE SELECT ───────────────────────────────────────── */
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const MAX = 5 * 1024 * 1024;
  if (file.size &gt; MAX) { toast(&#x27;Image must be under 5 MB&#x27;, &#x27;error&#x27;); return; }
  const allowed = [&#x27;image/jpeg&#x27;,&#x27;image/png&#x27;,&#x27;image/gif&#x27;,&#x27;image/webp&#x27;];
  if (!allowed.includes(file.type)) { toast(&#x27;Only JPG, PNG, GIF or WEBP allowed&#x27;, &#x27;error&#x27;); return; }
  pendingFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById(&#x27;imgPreview&#x27;).src = url;
  document.getElementById(&#x27;imgPreviewWrap&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;sendBtn&#x27;).disabled = false;
  e.target.value = &#x27;&#x27;;           // allow re-selecting same file
}

function clearImage() {
  pendingFile = null;
  document.getElementById(&#x27;imgPreviewWrap&#x27;).classList.remove(&#x27;show&#x27;);
  document.getElementById(&#x27;imgPreview&#x27;).src = &#x27;&#x27;;
  const inp = document.getElementById(&#x27;chatInput&#x27;);
  document.getElementById(&#x27;sendBtn&#x27;).disabled = inp.value.trim() === &#x27;&#x27;;
}

/* ── LIGHTBOX ──────────────────────────────────────────── */
function openLightbox(url) {
  document.getElementById(&#x27;lightboxImg&#x27;).src = url;
  document.getElementById(&#x27;lightbox&#x27;).classList.add(&#x27;open&#x27;);
}
function closeLightbox() {
  document.getElementById(&#x27;lightbox&#x27;).classList.remove(&#x27;open&#x27;);
}
document.addEventListener(&#x27;keydown&#x27;, e =&gt; { if(e.key===&#x27;Escape&#x27;) closeLightbox(); });

/* ── HELPERS ───────────────────────────────────────────── */
function handleKey(e) {
  if (e.key === &#x27;Enter&#x27; &amp;&amp; !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = &#x27;auto&#x27;;
  el.style.height = Math.min(el.scrollHeight, 120) + &#x27;px&#x27;;
}

function scrollToBottom(instant) {
  const wrap = document.getElementById(&#x27;messagesWrap&#x27;);
  wrap.scrollTo({ top: wrap.scrollHeight, behavior: instant ? &#x27;auto&#x27; : &#x27;smooth&#x27; });
}

function esc(str) {
  if (!str) return &#x27;&#x27;;
  return String(str)
    .replace(/&amp;/g,&#x27;&amp;amp;&#x27;).replace(/&lt;/g,&#x27;&amp;lt;&#x27;).replace(/&gt;/g,&#x27;&amp;gt;&#x27;)
    .replace(/&quot;/g,&#x27;&amp;quot;&#x27;).replace(/&#x27;/g,&#x27;&amp;#39;&#x27;);
}

function initials(name) {
  if (!name) return &#x27;?&#x27;;
  return name.split(&#x27; &#x27;).map(n=&gt;n[0]).slice(0,2).join(&#x27;&#x27;).toUpperCase();
}

const AV_COLORS = [&#x27;#00e676&#x27;,&#x27;#00b0ff&#x27;,&#x27;#7c3aed&#x27;,&#x27;#f59e0b&#x27;,&#x27;#ef4444&#x27;,&#x27;#06b6d4&#x27;,&#x27;#a78bfa&#x27;];
function avatarColor(name) { return AV_COLORS[(name||&#x27;?&#x27;).charCodeAt(0) % AV_COLORS.length]; }

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s &lt; 60)   return &#x27;just now&#x27;;
  if (s &lt; 3600) return `${Math.floor(s/60)}m ago`;
  if (s &lt; 86400)return `${Math.floor(s/3600)}h ago`;
  return new Date(d).toLocaleDateString();
}

function toast(msg, type=&#x27;success&#x27;) {
  const icons = {success:&#x27;✓&#x27;,error:&#x27;✕&#x27;,info:&#x27;ℹ&#x27;};
  const t = document.createElement(&#x27;div&#x27;);
  t.className = `pcb-toast pcb-toast--${type}`;
  t.innerHTML = `&lt;span class=&quot;pcb-toast__icon&quot;&gt;${icons[type]||icons.info}&lt;/span&gt;&lt;span&gt;${msg}&lt;/span&gt;`;
  document.body.appendChild(t);
  requestAnimationFrame(()=&gt;t.classList.add(&#x27;pcb-toast--show&#x27;));
  setTimeout(()=&gt;{t.classList.remove(&#x27;pcb-toast--show&#x27;);setTimeout(()=&gt;t.remove(),400);},3600);
}

/* ── BOOT ──────────────────────────────────────────────── */
init();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe><iframe id="sec2" class="frame" style="display:none" srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;
&lt;head&gt;
  &lt;meta charset=&quot;UTF-8&quot;/&gt;
  &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;/&gt;
  &lt;title&gt;Admin Panel | Poverty CrossBridge&lt;/title&gt;
  &lt;link href=&quot;https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;display=swap&quot; rel=&quot;stylesheet&quot;/&gt;
  &lt;script src=&quot;https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2&quot;&gt;&lt;/script&gt;
  &lt;style&gt;
    :root{
      --bg0:#030810;--bg1:#060f1e;--bg2:#0a1828;--card:rgba(8,18,36,0.95);
      --border:rgba(0,230,118,0.16);--green:#00e676;--green2:#00c853;
      --gold:#ffd600;--blue:#00b0ff;--purple:#a78bfa;--red:#ff5252;
      --text1:#e8f4ff;--text2:#7a9bb5;--text3:#3a5a75;--r:12px;
      --shadow:0 8px 32px rgba(0,0,0,0.6);--nav-w:230px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:&#x27;Rajdhani&#x27;,sans-serif;background:var(--bg0);color:var(--text1);
      min-height:100vh;display:flex;overflow-x:hidden;}
    h1,h2,h3,h4{font-family:&#x27;Orbitron&#x27;,sans-serif;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg1);}
    ::-webkit-scrollbar-thumb{background:#1a3a55;border-radius:99px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--green2);}
    button{cursor:pointer;font-family:&#x27;Rajdhani&#x27;,sans-serif;}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--nav-w);min-height:100vh;
      background:rgba(4,12,24,0.98);border-right:1px solid var(--border);
      display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;
    }
    .sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border);}
    .sidebar-logo-badge{font-size:10px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
    .sidebar-logo-title{font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:12px;font-weight:700;line-height:1.3;color:var(--text1);}
    .nav-label{padding:18px 18px 8px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:700;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:14px;font-weight:600;
      color:var(--text2);text-decoration:none;border-left:3px solid transparent;cursor:pointer;transition:all .2s;}
    .nav-item:hover{color:var(--text1);background:rgba(255,82,82,.04);}
    .nav-item.active{color:var(--red);border-left-color:var(--red);background:rgba(255,82,82,.07);}
    .nav-item svg{width:17px;height:17px;flex-shrink:0;}
    .nav-badge{margin-left:auto;padding:2px 8px;border-radius:99px;font-size:11px;
      background:rgba(255,82,82,.15);color:var(--red);}
    .sidebar-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);
      display:flex;align-items:center;gap:10px;}
    .sidebar-foot-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
    .sidebar-foot-name{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-signout{background:none;border:none;color:var(--text3);padding:4px;transition:color .2s;}
    .btn-signout:hover{color:var(--red);}

    /* ── MAIN ── */
    .main{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;}
    .topbar{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
      padding:0 26px;background:rgba(3,8,16,.95);border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:50;}
    .topbar h1{font-size:18px;font-weight:700;}
    .topbar-actions{display:flex;align-items:center;gap:10px;}
    .live-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:99px;
      background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.3);font-size:13px;font-weight:700;color:var(--red);}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .page-content{flex:1;padding:24px 26px;overflow-y:auto;}

    /* ── STAT CARDS ── */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      padding:18px;position:relative;overflow:hidden;transition:border-color .2s;}
    .stat-card:hover{border-color:rgba(255,255,255,.2);}
    .stat-card::before{content:&#x27;&#x27;;position:absolute;top:0;left:0;right:0;height:2px;}
    .sc-red::before{background:linear-gradient(90deg,#aa2020,var(--red));}
    .sc-green::before{background:linear-gradient(90deg,var(--green2),var(--green));}
    .sc-gold::before{background:linear-gradient(90deg,#aa8000,var(--gold));}
    .sc-blue::before{background:linear-gradient(90deg,#005588,var(--blue));}
    .sc-purple::before{background:linear-gradient(90deg,#5520b0,var(--purple));}
    .stat-num{font-family:&#x27;Orbitron&#x27;,sans-serif;font-size:32px;font-weight:900;margin-bottom:4px;}
    .stat-lbl{font-size:13px;color:var(--text2);}

    /* ── PANEL ── */
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:24px;overflow:hidden;}
    .panel-header{padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .panel-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .panel-actions{display:flex;align-items:center;gap:8px;}
    .search-input{padding:8px 14px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
      border-radius:8px;color:var(--text1);font-size:13px;outline:none;width:200px;
      transition:border-color .2s;font-family:&#x27;Rajdhani&#x27;,sans-serif;}
    .search-input:focus{border-color:var(--green);}
    .panel-body{overflow-x:auto;}

    /* ── TABLE ── */
    table{width:100%;border-collapse:collapse;}
    th{padding:11px 16px;text-align:left;font-size:11px;letter-spacing:1.5px;
      text-transform:uppercase;color:var(--text3);font-weight:700;
      background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
    td{padding:13px 16px;font-size:14px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.04);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(255,255,255,.025);}

    /* ── USER ROW ── */
    .user-cell{display:flex;align-items:center;gap:10px;}
    .user-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
    .user-av img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
    .user-name{font-weight:700;font-size:14px;}
    .user-email{font-size:12px;color:var(--text2);}

    /* ── BADGE ── */
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.5px;}
    .badge-green{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
    .badge-red{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.3);}
    .badge-blue{background:rgba(0,176,255,.12);color:var(--blue);border:1px solid rgba(0,176,255,.3);}
    .badge-gold{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.3);}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
      padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn-primary{background:linear-gradient(135deg,var(--green2),var(--green));color:#010a06;}
    .btn-primary:hover{filter:brightness(1.1);}
    .btn-danger{background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);color:var(--red);}
    .btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red);}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text1);}
    .btn-outline:hover{border-color:var(--green);color:var(--green);}
    .btn-gold{background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.3);color:var(--gold);}
    .btn-gold:hover{background:var(--gold);color:#030810;}
    .action-group{display:flex;gap:6px;flex-wrap:wrap;}

    /* ── MSG PREVIEW ── */
    .msg-preview{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px;}
    .msg-img-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border);}

    /* ── EMPTY TABLE ── */
    .table-empty{text-align:center;padding:40px;color:var(--text3);}
    .table-empty-icon{font-size:32px;margin-bottom:8px;}

    /* ── MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:500;
      background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
      align-items:center;justify-content:center;padding:24px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.8);}
    .modal h3{font-size:17px;margin-bottom:10px;}
    .modal p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px;}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;}

    /* ── LIGHTBOX ── */
    .lightbox{display:none;position:fixed;inset:0;z-index:600;
      background:rgba(0,0,0,.92);align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain;}
    .lightbox-close{position:fixed;top:18px;right:18px;background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.2);color:#fff;width:38px;height:38px;border-radius:50%;
      font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

    /* ── TOAST ── */
    .pcb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;
      display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:10px;
      font-size:15px;font-weight:600;background:var(--bg2);border:1px solid var(--border);
      box-shadow:var(--shadow);transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-width:340px;}
    .pcb-toast--show{transform:translateX(0);}
    .pcb-toast--success{border-color:var(--green);}
    .pcb-toast--success .pcb-toast__icon{color:var(--green);}
    .pcb-toast--error{border-color:var(--red);}
    .pcb-toast--error .pcb-toast__icon{color:var(--red);}
    .pcb-toast--info{border-color:var(--blue);}
    .pcb-toast--info .pcb-toast__icon{color:var(--blue);}
    .pcb-toast__icon{font-size:18px;}

    /* ── SECTION TABS ── */
    .section-tabs{display:flex;gap:4px;background:rgba(0,0,0,.4);
      border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin-bottom:20px;}
    .section-tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:700;
      background:none;border:none;color:var(--text2);cursor:pointer;transition:all .2s;}
    .section-tab.active{background:rgba(255,82,82,.15);color:var(--red);}

    .section-panel{display:none;}
    .section-panel.active{display:block;animation:fadeUp .3s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .loading-row td{text-align:center;padding:40px;color:var(--text2);}
    .mini-spinner{width:20px;height:20px;border:2px solid rgba(0,230,118,.2);border-top-color:var(--green);
      border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}

    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .main{margin-left:0;}
      .page-content{padding:16px;}
      .stats-row{grid-template-columns:1fr 1fr;}
    }
  &lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;

&lt;!-- Confirm Modal --&gt;
&lt;div class=&quot;modal-overlay&quot; id=&quot;confirmModal&quot;&gt;
  &lt;div class=&quot;modal&quot;&gt;
    &lt;h3 id=&quot;modalTitle&quot;&gt;Confirm Action&lt;/h3&gt;
    &lt;p id=&quot;modalBody&quot;&gt;Are you sure?&lt;/p&gt;
    &lt;div class=&quot;modal-actions&quot;&gt;
      &lt;button class=&quot;btn btn-outline btn-sm&quot; onclick=&quot;closeModal()&quot;&gt;Cancel&lt;/button&gt;
      &lt;button class=&quot;btn btn-danger btn-sm&quot; id=&quot;modalConfirm&quot;&gt;Confirm&lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- Lightbox --&gt;
&lt;div class=&quot;lightbox&quot; id=&quot;lightbox&quot; onclick=&quot;closeLightbox()&quot;&gt;

&lt;!-- ── SIDEBAR ─────────────────────────────────────────── --&gt;
&lt;aside class=&quot;sidebar&quot; id=&quot;sidebar&quot;&gt;
  &lt;div class=&quot;sidebar-logo&quot;&gt;
    &lt;div class=&quot;sidebar-logo-badge&quot;&gt;🛡 Admin Panel&lt;/div&gt;
    &lt;div class=&quot;sidebar-logo-title&quot;&gt;POVERTY CROSSBRIDGE&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;nav-label&quot;&gt;Monitor&lt;/div&gt;
  &lt;a class=&quot;nav-item active&quot; onclick=&quot;showSection(&#x27;overview&#x27;)&quot;&gt;

    &lt;span class=&quot;nav-badge&quot; id=&quot;msgCountBadge&quot;&gt;0&lt;/span&gt;

  &lt;div class=&quot;nav-label&quot;&gt;Quick Links&lt;/div&gt;

    &lt;svg fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path d=&quot;M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z&quot;/&gt;&lt;polyline points=&quot;9 22 9 12 15 12 15 22&quot;/&gt;&lt;/svg&gt;

  &lt;/a&gt;

    Live Chat Room
  &lt;/a&gt;
  &lt;div class=&quot;sidebar-foot&quot;&gt;
    &lt;div class=&quot;sidebar-foot-av&quot; id=&quot;adminAv&quot; style=&quot;background:#ff5252;color:#fff&quot;&gt;A&lt;/div&gt;
    &lt;div class=&quot;sidebar-foot-name&quot; id=&quot;adminName&quot;&gt;Admin&lt;/div&gt;

      &lt;svg width=&quot;17&quot; height=&quot;17&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; viewBox=&quot;0 0 24 24&quot;&gt;
        &lt;path d=&quot;M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4&quot;/&gt;
        &lt;polyline points=&quot;16 17 21 12 16 7&quot;/&gt;
        &lt;line x1=&quot;21&quot; y1=&quot;12&quot; x2=&quot;9&quot; y2=&quot;12&quot;/&gt;
      &lt;/svg&gt;
    &lt;/button&gt;
  &lt;/div&gt;
&lt;/aside&gt;

&lt;!-- ── MAIN ─────────────────────────────────────────────── --&gt;
&lt;main class=&quot;main&quot;&gt;
  &lt;div class=&quot;topbar&quot;&gt;
    &lt;h1 id=&quot;topbarTitle&quot;&gt;Overview&lt;/h1&gt;
    &lt;div class=&quot;topbar-actions&quot;&gt;
      &lt;span class=&quot;live-pill&quot;&gt;&lt;span class=&quot;live-dot&quot;&gt;&lt;/span&gt;Live Monitoring&lt;/span&gt;
      &lt;button class=&quot;btn btn-outline btn-sm&quot; onclick=&quot;refreshAll()&quot;&gt;⟳ Refresh&lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;page-content&quot;&gt;

    &lt;!-- ── OVERVIEW ── --&gt;
    &lt;div class=&quot;section-panel active&quot; id=&quot;sec-overview&quot;&gt;
      &lt;div class=&quot;stats-row&quot; id=&quot;statsRow&quot;&gt;
        &lt;div class=&quot;stat-card sc-green&quot;&gt;
          &lt;div class=&quot;stat-num&quot; id=&quot;statUsers&quot;&gt;—&lt;/div&gt;
          &lt;div class=&quot;stat-lbl&quot;&gt;Total Users&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;stat-card sc-blue&quot;&gt;
          &lt;div class=&quot;stat-num&quot; id=&quot;statMsgs&quot;&gt;—&lt;/div&gt;
          &lt;div class=&quot;stat-lbl&quot;&gt;Total Messages&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;stat-card sc-gold&quot;&gt;
          &lt;div class=&quot;stat-num&quot; id=&quot;statImgs&quot;&gt;—&lt;/div&gt;
          &lt;div class=&quot;stat-lbl&quot;&gt;Images Shared&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;stat-card sc-red&quot;&gt;
          &lt;div class=&quot;stat-num&quot; id=&quot;statAdmins&quot;&gt;—&lt;/div&gt;
          &lt;div class=&quot;stat-lbl&quot;&gt;Admins&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;stat-card sc-purple&quot;&gt;
          &lt;div class=&quot;stat-num&quot; id=&quot;statToday&quot;&gt;—&lt;/div&gt;
          &lt;div class=&quot;stat-lbl&quot;&gt;Messages Today&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;panel&quot;&gt;
        &lt;div class=&quot;panel-header&quot;&gt;
          &lt;div class=&quot;panel-title&quot;&gt;🕒 Recent Activity&lt;/div&gt;
          &lt;button class=&quot;btn btn-primary btn-sm&quot; onclick=&quot;showSection(&#x27;messages&#x27;)&quot;&gt;View All Messages&lt;/button&gt;
        &lt;/div&gt;
        &lt;div class=&quot;panel-body&quot;&gt;
          &lt;table&gt;
            &lt;thead&gt;&lt;tr&gt;&lt;th&gt;User&lt;/th&gt;&lt;th&gt;Message&lt;/th&gt;&lt;th&gt;Time&lt;/th&gt;&lt;th&gt;Action&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
            &lt;tbody id=&quot;recentTable&quot;&gt;&lt;tr class=&quot;loading-row&quot;&gt;&lt;td colspan=&quot;4&quot;&gt;&lt;span class=&quot;mini-spinner&quot;&gt;&lt;/span&gt;Loading…&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;
          &lt;/table&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;panel&quot;&gt;
        &lt;div class=&quot;panel-header&quot;&gt;
          &lt;div class=&quot;panel-title&quot;&gt;👥 Recent Users&lt;/div&gt;
          &lt;button class=&quot;btn btn-outline btn-sm&quot; onclick=&quot;showSection(&#x27;users&#x27;)&quot;&gt;View All&lt;/button&gt;
        &lt;/div&gt;
        &lt;div class=&quot;panel-body&quot;&gt;
          &lt;table&gt;
            &lt;thead&gt;&lt;tr&gt;&lt;th&gt;User&lt;/th&gt;&lt;th&gt;Role&lt;/th&gt;&lt;th&gt;Joined&lt;/th&gt;&lt;th&gt;Action&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
            &lt;tbody id=&quot;recentUsersTable&quot;&gt;&lt;tr class=&quot;loading-row&quot;&gt;&lt;td colspan=&quot;4&quot;&gt;&lt;span class=&quot;mini-spinner&quot;&gt;&lt;/span&gt;Loading…&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;
          &lt;/table&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- ── USERS ── --&gt;
    &lt;div class=&quot;section-panel&quot; id=&quot;sec-users&quot;&gt;
      &lt;div class=&quot;panel&quot;&gt;
        &lt;div class=&quot;panel-header&quot;&gt;
          &lt;div class=&quot;panel-title&quot;&gt;👥 All Users&lt;/div&gt;
          &lt;div class=&quot;panel-actions&quot;&gt;
            &lt;input class=&quot;search-input&quot; type=&quot;text&quot; placeholder=&quot;Search users…&quot;
              oninput=&quot;filterUsers(this.value)&quot;/&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;panel-body&quot;&gt;
          &lt;table&gt;
            &lt;thead&gt;&lt;tr&gt;&lt;th&gt;User&lt;/th&gt;&lt;th&gt;Role&lt;/th&gt;&lt;th&gt;Joined&lt;/th&gt;&lt;th&gt;Actions&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
            &lt;tbody id=&quot;usersTable&quot;&gt;&lt;tr class=&quot;loading-row&quot;&gt;&lt;td colspan=&quot;4&quot;&gt;&lt;span class=&quot;mini-spinner&quot;&gt;&lt;/span&gt;Loading…&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;
          &lt;/table&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;!-- ── MESSAGES ── --&gt;
    &lt;div class=&quot;section-panel&quot; id=&quot;sec-messages&quot;&gt;
      &lt;div class=&quot;panel&quot;&gt;
        &lt;div class=&quot;panel-header&quot;&gt;
          &lt;div class=&quot;panel-title&quot;&gt;💬 All Messages&lt;/div&gt;
          &lt;div class=&quot;panel-actions&quot;&gt;
            &lt;input class=&quot;search-input&quot; type=&quot;text&quot; placeholder=&quot;Search messages…&quot;
              oninput=&quot;filterMessages(this.value)&quot;/&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;panel-body&quot;&gt;
          &lt;table&gt;
            &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Author&lt;/th&gt;&lt;th&gt;Content&lt;/th&gt;&lt;th&gt;Type&lt;/th&gt;&lt;th&gt;Time&lt;/th&gt;&lt;th&gt;Action&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
            &lt;tbody id=&quot;messagesTable&quot;&gt;&lt;tr class=&quot;loading-row&quot;&gt;&lt;td colspan=&quot;5&quot;&gt;&lt;span class=&quot;mini-spinner&quot;&gt;&lt;/span&gt;Loading…&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;
          &lt;/table&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;&lt;!-- /.page-content --&gt;
&lt;/main&gt;

&lt;script src=&quot;supabase-config.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
/* ── STATE ─────────────────────────────────────────────── */
let allUsers    = [];
let allMessages = [];
let adminUser   = null;
let modalAction = null;

/* ── INIT ──────────────────────────────────────────────── */
async function init() {
  const result = await requireAdmin();
  if (!result) return;
  adminUser = result.user;
  const name = result.profile?.full_name || adminUser.email || &#x27;Admin&#x27;;
  document.getElementById(&#x27;adminName&#x27;).textContent = name;
  const av = document.getElementById(&#x27;adminAv&#x27;);
  av.textContent = (name||&#x27;A&#x27;)[0].toUpperCase();

  await refreshAll();
}

async function refreshAll() {
  await Promise.all([loadStats(), loadUsers(), loadMessages()]);
}

/* ── STATS ─────────────────────────────────────────────── */
async function loadStats() {
  const [usersRes, msgsRes] = await Promise.all([
    DB.getAllProfiles(),
    DB.getAllMessages()
  ]);
  allUsers    = usersRes.data  || [];
  allMessages = msgsRes.data   || [];

  const admins    = allUsers.filter(u =&gt; u.role === &#x27;admin&#x27;).length;
  const imgMsgs   = allMessages.filter(m =&gt; m.image_url).length;
  const today     = allMessages.filter(m =&gt; {
    const d = new Date(m.created_at);
    const n = new Date();
    return d.getDate()===n.getDate() &amp;&amp; d.getMonth()===n.getMonth() &amp;&amp; d.getFullYear()===n.getFullYear();
  }).length;

  document.getElementById(&#x27;statUsers&#x27;).textContent  = allUsers.length;
  document.getElementById(&#x27;statMsgs&#x27;).textContent   = allMessages.length;
  document.getElementById(&#x27;statImgs&#x27;).textContent   = imgMsgs;
  document.getElementById(&#x27;statAdmins&#x27;).textContent = admins;
  document.getElementById(&#x27;statToday&#x27;).textContent  = today;

  document.getElementById(&#x27;userCountBadge&#x27;).textContent = allUsers.length;
  document.getElementById(&#x27;msgCountBadge&#x27;).textContent  = allMessages.length;

  renderRecentMessages(allMessages.slice(0, 8));
  renderRecentUsers(allUsers.slice(0, 6));
}

/* ── USERS ─────────────────────────────────────────────── */
async function loadUsers() {
  const { data } = await DB.getAllProfiles();
  allUsers = data || [];
  renderUsers(allUsers);
}

function renderUsers(users) {
  const tbody = document.getElementById(&#x27;usersTable&#x27;);
  if (!users.length) {
    tbody.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;table-empty&quot;&gt;&lt;div class=&quot;table-empty-icon&quot;&gt;👥&lt;/div&gt;No users found&lt;/td&gt;&lt;/tr&gt;`;
    return;
  }
  tbody.innerHTML = users.map(u =&gt; {
    const name = u.full_name || u.email || &#x27;Unknown&#x27;;
    const role = u.role || &#x27;user&#x27;;
    const ini  = (name[0]||&#x27;?&#x27;).toUpperCase();
    const col  = AV_COLORS[(name).charCodeAt(0) % AV_COLORS.length];
    const isMe = u.id === adminUser?.id;
    return `
    &lt;tr id=&quot;user-row-${esc(u.id)}&quot;&gt;
      &lt;td&gt;
        &lt;div class=&quot;user-cell&quot;&gt;
          &lt;div class=&quot;user-av&quot; style=&quot;background:${col};color:#030810&quot;&gt;
            ${u.avatar_url ? `&lt;img src=&quot;${esc(u.avatar_url)}&quot; alt=&quot;${esc(name)}&quot; loading=&quot;lazy&quot;/&gt;` : ini}
          &lt;/div&gt;
          &lt;div&gt;
            &lt;div class=&quot;user-name&quot;&gt;${esc(name)} ${isMe ? &#x27;&lt;span class=&quot;badge badge-gold&quot;&gt;You&lt;/span&gt;&#x27; : &#x27;&#x27;}&lt;/div&gt;
            &lt;div class=&quot;user-email&quot;&gt;${esc(u.email || &#x27;&#x27;)}&lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/td&gt;
      &lt;td&gt;
        &lt;span class=&quot;badge ${role===&#x27;admin&#x27;?&#x27;badge-red&#x27;:&#x27;badge-green&#x27;}&quot;&gt;${role}&lt;/span&gt;
      &lt;/td&gt;
      &lt;td style=&quot;color:var(--text2);font-size:13px&quot;&gt;${new Date(u.created_at).toLocaleDateString()}&lt;/td&gt;
      &lt;td&gt;
        &lt;div class=&quot;action-group&quot;&gt;
          ${role !== &#x27;admin&#x27; &amp;&amp; !isMe
            ? `&lt;button class=&quot;btn btn-gold btn-sm&quot; onclick=&quot;promoteUser(&#x27;${u.id}&#x27;,&#x27;${esc(name)}&#x27;)&quot;&gt;Make Admin&lt;/button&gt;`
            : &#x27;&#x27;}
          ${!isMe
            ? `&lt;button class=&quot;btn btn-danger btn-sm&quot; onclick=&quot;confirmDeleteUser(&#x27;${u.id}&#x27;,&#x27;${esc(name)}&#x27;)&quot;&gt;Remove&lt;/button&gt;`
            : &#x27;&lt;span style=&quot;color:var(--text3);font-size:13px&quot;&gt;—&lt;/span&gt;&#x27;}
        &lt;/div&gt;
      &lt;/td&gt;
    &lt;/tr&gt;`;
  }).join(&#x27;&#x27;);
}

function filterUsers(q) {
  const f = allUsers.filter(u =&gt;
    (u.full_name||&#x27;&#x27;).toLowerCase().includes(q.toLowerCase()) ||
    (u.email||&#x27;&#x27;).toLowerCase().includes(q.toLowerCase())
  );
  renderUsers(f);
}

async function promoteUser(uid, name) {
  openModal(`Promote ${name}`, `Make ${name} an Admin? They will have full access to this panel.`, async () =&gt; {
    const { error } = await DB.upsertProfile(uid, { role: &#x27;admin&#x27; });
    if (error) toast(&#x27;Failed to promote user&#x27;, &#x27;error&#x27;);
    else { toast(`${name} is now an Admin!`, &#x27;success&#x27;); await refreshAll(); }
    closeModal();
  });
}

function confirmDeleteUser(uid, name) {
  openModal(`Remove User`, `Permanently remove ${name}? All their messages will also be deleted.`, async () =&gt; {
    const msgs = allMessages.filter(m =&gt; m.user_id === uid);
    for (const m of msgs) {
      if (m.image_path) await Storage.deleteImage(m.image_path);
      await DB.deleteMessage(m.id);
    }
    await DB.deleteProfile(uid);
    closeModal();
    toast(`${name} has been removed.`, &#x27;success&#x27;);
    await refreshAll();
  });
}

/* ── MESSAGES ──────────────────────────────────────────── */
async function loadMessages() {
  const { data } = await DB.getAllMessages();
  allMessages = data || [];
  renderMessages(allMessages);
}

function renderMessages(msgs) {
  const tbody = document.getElementById(&#x27;messagesTable&#x27;);
  if (!msgs.length) {
    tbody.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;table-empty&quot;&gt;&lt;div class=&quot;table-empty-icon&quot;&gt;💬&lt;/div&gt;No messages&lt;/td&gt;&lt;/tr&gt;`;
    return;
  }
  tbody.innerHTML = msgs.map(m =&gt; {
    const p = m.profiles || {};
    const name = p.full_name || p.email || &#x27;Unknown&#x27;;
    const ini  = (name[0]||&#x27;?&#x27;).toUpperCase();
    const col  = AV_COLORS[(name).charCodeAt(0) % AV_COLORS.length];
    const typeLabel = m.message_type === &#x27;image&#x27; ? &#x27;Image&#x27; : m.message_type === &#x27;mixed&#x27; ? &#x27;Mixed&#x27; : &#x27;Text&#x27;;
    const typeColor = m.message_type === &#x27;image&#x27; ? &#x27;badge-blue&#x27; : m.message_type === &#x27;mixed&#x27; ? &#x27;badge-gold&#x27; : &#x27;badge-green&#x27;;
    return `
    &lt;tr id=&quot;msg-row-${esc(m.id)}&quot;&gt;
      &lt;td&gt;
        &lt;div class=&quot;user-cell&quot;&gt;
          &lt;div class=&quot;user-av&quot; style=&quot;background:${col};color:#030810;width:30px;height:30px;font-size:11px&quot;&gt;
            ${p.avatar_url ? `&lt;img src=&quot;${esc(p.avatar_url)}&quot; loading=&quot;lazy&quot;/&gt;` : ini}
          &lt;/div&gt;
          &lt;span style=&quot;font-size:13px&quot;&gt;${esc(name)}&lt;/span&gt;
        &lt;/div&gt;
      &lt;/td&gt;
      &lt;td&gt;
        ${m.image_url
          ? `&lt;img class=&quot;msg-img-thumb&quot; src=&quot;${esc(m.image_url)}&quot; onclick=&quot;openLightbox(&#x27;${esc(m.image_url)}&#x27;)&quot; title=&quot;Click to view&quot;/&gt;`
          : &#x27;&#x27;}
        &lt;span class=&quot;msg-preview&quot;&gt;${m.content ? esc(m.content) : &#x27;&lt;em style=&quot;color:var(--text3)&quot;&gt;Image only&lt;/em&gt;&#x27;}&lt;/span&gt;
      &lt;/td&gt;
      &lt;td&gt;&lt;span class=&quot;badge ${typeColor}&quot;&gt;${typeLabel}&lt;/span&gt;&lt;/td&gt;
      &lt;td style=&quot;color:var(--text2);font-size:12px;white-space:nowrap&quot;&gt;${timeAgo(m.created_at)}&lt;/td&gt;
      &lt;td&gt;
        &lt;button class=&quot;btn btn-danger btn-sm&quot; onclick=&quot;confirmDeleteMsg(&#x27;${m.id}&#x27;,&#x27;${m.image_path||&#x27;&#x27;}&#x27;)&quot;&gt;Delete&lt;/button&gt;
      &lt;/td&gt;
    &lt;/tr&gt;`;
  }).join(&#x27;&#x27;);
}

function renderRecentMessages(msgs) {
  const tbody = document.getElementById(&#x27;recentTable&#x27;);
  if (!msgs.length) {
    tbody.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;table-empty&quot;&gt;No messages yet&lt;/td&gt;&lt;/tr&gt;`;
    return;
  }
  tbody.innerHTML = msgs.map(m =&gt; {
    const p = m.profiles || {};
    const name = p.full_name || p.email || &#x27;Unknown&#x27;;
    return `
    &lt;tr&gt;
      &lt;td style=&quot;font-size:13px;font-weight:600&quot;&gt;${esc(name)}&lt;/td&gt;
      &lt;td&gt;&lt;span class=&quot;msg-preview&quot;&gt;${m.image_url ? &#x27;🖼 [Image]&#x27; : &#x27;&#x27;} ${m.content ? esc(m.content) : &#x27;&#x27;}&lt;/span&gt;&lt;/td&gt;
      &lt;td style=&quot;color:var(--text2);font-size:12px&quot;&gt;${timeAgo(m.created_at)}&lt;/td&gt;
      &lt;td&gt;&lt;button class=&quot;btn btn-danger btn-sm&quot; onclick=&quot;confirmDeleteMsg(&#x27;${m.id}&#x27;,&#x27;${m.image_path||&#x27;&#x27;}&#x27;)&quot;&gt;Delete&lt;/button&gt;&lt;/td&gt;
    &lt;/tr&gt;`;
  }).join(&#x27;&#x27;);
}

function renderRecentUsers(users) {
  const tbody = document.getElementById(&#x27;recentUsersTable&#x27;);
  if (!users.length) {
    tbody.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;table-empty&quot;&gt;No users yet&lt;/td&gt;&lt;/tr&gt;`;
    return;
  }
  tbody.innerHTML = users.map(u =&gt; {
    const name = u.full_name || u.email || &#x27;Unknown&#x27;;
    const role = u.role || &#x27;user&#x27;;
    return `
    &lt;tr&gt;
      &lt;td style=&quot;font-size:13px;font-weight:600&quot;&gt;${esc(name)}&lt;/td&gt;
      &lt;td&gt;&lt;span class=&quot;badge ${role===&#x27;admin&#x27;?&#x27;badge-red&#x27;:&#x27;badge-green&#x27;}&quot;&gt;${role}&lt;/span&gt;&lt;/td&gt;
      &lt;td style=&quot;color:var(--text2);font-size:12px&quot;&gt;${new Date(u.created_at).toLocaleDateString()}&lt;/td&gt;
      &lt;td&gt;
        ${role !== &#x27;admin&#x27; &amp;&amp; u.id !== adminUser?.id
          ? `&lt;button class=&quot;btn btn-gold btn-sm&quot; onclick=&quot;promoteUser(&#x27;${u.id}&#x27;,&#x27;${esc(name)}&#x27;)&quot;&gt;Make Admin&lt;/button&gt;`
          : &#x27;—&#x27;}
      &lt;/td&gt;
    &lt;/tr&gt;`;
  }).join(&#x27;&#x27;);
}

function filterMessages(q) {
  const f = allMessages.filter(m =&gt;
    (m.content||&#x27;&#x27;).toLowerCase().includes(q.toLowerCase()) ||
    (m.profiles?.full_name||&#x27;&#x27;).toLowerCase().includes(q.toLowerCase()) ||
    (m.profiles?.email||&#x27;&#x27;).toLowerCase().includes(q.toLowerCase())
  );
  renderMessages(f);
}

function confirmDeleteMsg(id, imgPath) {
  openModal(&#x27;Delete Message&#x27;, &#x27;Permanently delete this message? This cannot be undone.&#x27;, async () =&gt; {
    if (imgPath) await Storage.deleteImage(imgPath);
    const { error } = await DB.deleteMessage(id);
    if (error) toast(&#x27;Could not delete message&#x27;, &#x27;error&#x27;);
    else {
      toast(&#x27;Message deleted&#x27;, &#x27;success&#x27;);
      const row = document.getElementById(`msg-row-${id}`);
      if (row) { row.style.opacity=&#x27;0&#x27;;row.style.transition=&#x27;opacity .3s&#x27;;setTimeout(()=&gt;row.remove(),300); }
      allMessages = allMessages.filter(m =&gt; m.id !== id);
      document.getElementById(&#x27;msgCountBadge&#x27;).textContent = allMessages.length;
    }
    closeModal();
  });
}

/* ── NAV ─────────────────────────────────────────────────── */
const SECTION_TITLES = { overview:&#x27;Overview&#x27;, users:&#x27;Users&#x27;, messages:&#x27;Messages&#x27; };
function showSection(id) {
  document.querySelectorAll(&#x27;.section-panel&#x27;).forEach(p=&gt;p.classList.remove(&#x27;active&#x27;));
  document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n=&gt;n.classList.remove(&#x27;active&#x27;));
  document.getElementById(`sec-${id}`).classList.add(&#x27;active&#x27;);
  document.querySelectorAll(&#x27;.nav-item&#x27;).forEach(n =&gt; {
    if(n.getAttribute(&#x27;onclick&#x27;)===`showSection(&#x27;${id}&#x27;)`) n.classList.add(&#x27;active&#x27;);
  });
  document.getElementById(&#x27;topbarTitle&#x27;).textContent = SECTION_TITLES[id] || id;
}

/* ── MODAL ─────────────────────────────────────────────── */
function openModal(title, body, onConfirm) {
  document.getElementById(&#x27;modalTitle&#x27;).textContent = title;
  document.getElementById(&#x27;modalBody&#x27;).textContent  = body;
  document.getElementById(&#x27;confirmModal&#x27;).classList.add(&#x27;open&#x27;);
  modalAction = onConfirm;
  document.getElementById(&#x27;modalConfirm&#x27;).onclick = () =&gt; { if(modalAction) modalAction(); };
}
function closeModal() {
  document.getElementById(&#x27;confirmModal&#x27;).classList.remove(&#x27;open&#x27;);
  modalAction = null;
}

/* ── LIGHTBOX ─────────────────────────────────────────── */
function openLightbox(url) {
  document.getElementById(&#x27;lightboxImg&#x27;).src = url;
  document.getElementById(&#x27;lightbox&#x27;).classList.add(&#x27;open&#x27;);
}
function closeLightbox() { document.getElementById(&#x27;lightbox&#x27;).classList.remove(&#x27;open&#x27;); }
document.getElementById(&#x27;lightbox&#x27;).addEventListener(&#x27;click&#x27;, closeLightbox);
document.addEventListener(&#x27;keydown&#x27;, e =&gt; { if(e.key===&#x27;Escape&#x27;) { closeModal(); closeLightbox(); } });

/* ── HELPERS ─────────────────────────────────────────── */
const AV_COLORS = [&#x27;#00e676&#x27;,&#x27;#00b0ff&#x27;,&#x27;#7c3aed&#x27;,&#x27;#f59e0b&#x27;,&#x27;#ef4444&#x27;,&#x27;#06b6d4&#x27;,&#x27;#a78bfa&#x27;];

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s &lt; 60)   return &#x27;just now&#x27;;
  if (s &lt; 3600) return `${Math.floor(s/60)}m ago`;
  if (s &lt; 86400)return `${Math.floor(s/3600)}h ago`;
  return new Date(d).toLocaleDateString();
}
function esc(str) {
  if (!str) return &#x27;&#x27;;
  return String(str).replace(/&amp;/g,&#x27;&amp;amp;&#x27;).replace(/&lt;/g,&#x27;&amp;lt;&#x27;).replace(/&gt;/g,&#x27;&amp;gt;&#x27;).replace(/&quot;/g,&#x27;&amp;quot;&#x27;).replace(/&#x27;/g,&#x27;&amp;#39;&#x27;);
}
function toast(msg, type=&#x27;success&#x27;) {
  const icons = {success:&#x27;✓&#x27;,error:&#x27;✕&#x27;,info:&#x27;ℹ&#x27;};
  const t = document.createElement(&#x27;div&#x27;);
  t.className = `pcb-toast pcb-toast--${type}`;
  t.innerHTML = `&lt;span class=&quot;pcb-toast__icon&quot;&gt;${icons[type]||icons.info}&lt;/span&gt;&lt;span&gt;${msg}&lt;/span&gt;`;
  document.body.appendChild(t);
  requestAnimationFrame(()=&gt;t.classList.add(&#x27;pcb-toast--show&#x27;));
  setTimeout(()=&gt;{t.classList.remove(&#x27;pcb-toast--show&#x27;);setTimeout(()=&gt;t.remove(),400);},3600);
}
async function handleSignOut() {
  await Auth.signOut();
  window.location.href = &#x27;index.html&#x27;;
}

init();
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
<script>
function showTab(id, btn) {
  document.querySelectorAll('.frame').forEach(f => f.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
